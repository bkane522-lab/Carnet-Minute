<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0B1426" />
  <title>Historique — Carnet Minute</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar premium-topbar">
    <a class="back-link" href="index.html" aria-label="Retour accueil">←</a>
    <div class="topbar-brand">
      <div class="cm-logo cm-logo-sm"><span>CM</span></div>
      <div>
        <p class="eyebrow">sessions locales</p>
        <h1>Historique</h1>
      </div>
    </div>
    <a class="topbar-link" href="record.html">Nouveau</a>
  </header>

  <main class="shell compact-shell">
    <section class="paper-card history-head">
      <div>
        <p class="eyebrow">archive privée</p>
        <h2>Vos comptes rendus</h2>
        <p class="muted">Les sessions sont stockées uniquement sur cet appareil.</p>
      </div>
      <button class="btn btn-danger soft" id="clearHistoryBtn" type="button">Vider</button>
    </section>

    <section id="historyList" class="history-list" aria-label="Historique des sessions"></section>

    <section class="empty-state paper-card" id="emptyState" hidden>
      <div class="cm-logo cm-logo-xl"><span>CM</span></div>
      <h2>Aucune session</h2>
      <p>Enregistrez ou importez un audio pour créer votre premier compte rendu.</p>
      <a class="btn btn-primary" href="record.html">Créer une session</a>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Navigation principale">
    <a href="index.html"><span>⌂</span>Accueil</a>
    <a href="record.html"><span>◉</span>Capturer</a>
    <a class="is-active" href="history.html"><span>□</span>Historique</a>
  </nav>

  <script src="app.js"></script>
  <script src="history.js"></script>
</body>
</html>
